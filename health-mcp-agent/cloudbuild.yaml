steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west3-docker.pkg.dev/mcp-personel-health/health-agent-repo/health-mcp-agent:latest', '.']
  
  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west3-docker.pkg.dev/mcp-personel-health/health-agent-repo/health-mcp-agent:latest']
    
  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'health-mcp-agent'
      - '--image'
      - 'europe-west3-docker.pkg.dev/mcp-personel-health/health-agent-repo/health-mcp-agent:latest'
      - '--region'
      - 'europe-west3'
      - '--service-account'
      - 'health-mcp-agent-sa@mcp-personel-health.iam.gserviceaccount.com'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--memory'
      - '512Mi'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=mcp-personel-health,FIRESTORE_USER_ID=user_001'

images:
  - 'europe-west3-docker.pkg.dev/mcp-personel-health/health-agent-repo/health-mcp-agent:latest'
